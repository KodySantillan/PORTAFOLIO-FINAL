<!DOCTYPE html>
<html lang="es" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Portafolio — Brandon Kody Santillan</title>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    :root{--bg:#050810;--accent:#00e5ff;--accent2:#7c3aed;--text:#e2e8f0;--muted:#64748b;}
    *{margin:0;padding:0;box-sizing:border-box;}
    body{font-family:'Poppins',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;display:flex;align-items:center;justify-content:center;overflow:hidden;}
    canvas{position:fixed;inset:0;z-index:0;opacity:0.3;}
    .grid-overlay{position:fixed;inset:0;z-index:1;pointer-events:none;background-image:linear-gradient(rgba(0,229,255,0.025) 1px,transparent 1px),linear-gradient(90deg,rgba(0,229,255,0.025) 1px,transparent 1px);background-size:60px 60px;}
    .orb{position:fixed;border-radius:50%;filter:blur(120px);pointer-events:none;z-index:1;}
    .orb-1{width:500px;height:500px;background:rgba(124,58,237,0.15);top:-100px;left:-100px;animation:drift1 14s ease-in-out infinite;}
    .orb-2{width:400px;height:400px;background:rgba(0,229,255,0.08);bottom:-100px;right:-100px;animation:drift2 17s ease-in-out infinite;}
    @keyframes drift1{0%,100%{transform:translate(0,0)}50%{transform:translate(60px,40px)}}
    @keyframes drift2{0%,100%{transform:translate(0,0)}50%{transform:translate(-40px,-60px)}}
    .splash-container{position:relative;z-index:10;display:flex;flex-direction:column;align-items:center;justify-content:center;opacity:0;animation:fadeIn 0.8s ease forwards 0.2s;}
    @keyframes fadeIn{to{opacity:1;}}
    .logo-wrapper{position:relative;width:160px;height:160px;display:flex;align-items:center;justify-content:center;margin-bottom:28px;}
    .logo-ring{position:absolute;inset:0;border-radius:50%;border:2px solid transparent;background:linear-gradient(135deg,rgba(0,229,255,0.5),rgba(124,58,237,0.5)) border-box;-webkit-mask:linear-gradient(#fff 0 0) padding-box,linear-gradient(#fff 0 0);-webkit-mask-composite:destination-out;mask-composite:exclude;animation:spin 8s linear infinite;}
    .logo-ring-2{position:absolute;inset:8px;border-radius:50%;border:1px solid rgba(0,229,255,0.15);animation:spin 12s linear infinite reverse;}
    @keyframes spin{to{transform:rotate(360deg);}}
    .logo-img{width:130px;height:130px;border-radius:50%;object-fit:cover;border:3px solid rgba(0,229,255,0.2);box-shadow:0 0 40px rgba(0,229,255,0.15);animation:logoPulse 3s ease-in-out infinite;}
    @keyframes logoPulse{0%,100%{box-shadow:0 0 40px rgba(0,229,255,0.15);}50%{box-shadow:0 0 60px rgba(0,229,255,0.3);}}
    .upla-text{font-family:'Poppins',sans-serif;font-size:0.65rem;letter-spacing:0.22em;text-transform:uppercase;color:var(--muted);margin-bottom:24px;animation:slideUp 0.6s ease forwards 0.5s;opacity:0;transform:translateY(10px);}
    @keyframes slideUp{to{opacity:1;transform:translateY(0);}}
    .splash-title{font-family:'Poppins',sans-serif;font-size:clamp(1.8rem,5vw,3rem);font-weight:800;text-align:center;line-height:1.1;letter-spacing:-0.02em;margin-bottom:8px;animation:slideUp 0.6s ease forwards 0.7s;opacity:0;transform:translateY(10px);}
    .splash-title span{background:linear-gradient(135deg,#fff 0%,var(--accent) 100%);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;}
    .splash-name{font-size:0.78rem;color:var(--muted);text-align:center;margin-bottom:6px;animation:slideUp 0.6s ease forwards 0.85s;opacity:0;transform:translateY(10px);}
    .splash-sub{font-size:0.72rem;color:var(--muted);letter-spacing:0.1em;text-align:center;margin-bottom:44px;animation:slideUp 0.6s ease forwards 0.9s;opacity:0;transform:translateY(10px);}
    .enter-btn{padding:14px 48px;background:linear-gradient(135deg,var(--accent2),#6d28d9);border:none;border-radius:50px;color:white;font-family:'Poppins',sans-serif;font-size:0.82rem;font-weight:500;letter-spacing:0.1em;text-transform:uppercase;cursor:pointer;transition:all 0.3s;box-shadow:0 8px 28px rgba(124,58,237,0.35);animation:slideUp 0.6s ease forwards 1.1s;opacity:0;transform:translateY(10px);position:relative;overflow:hidden;}
    .enter-btn:hover{transform:translateY(-3px);box-shadow:0 14px 36px rgba(124,58,237,0.5);}
    .dots{display:flex;gap:8px;margin-top:36px;animation:slideUp 0.6s ease forwards 1.3s;opacity:0;}
    .dot{width:6px;height:6px;border-radius:50%;background:var(--muted);opacity:0.3;}
    .dot.active{background:var(--accent);opacity:1;animation:blink 1.4s ease-in-out infinite;}
    @keyframes blink{0%,100%{opacity:1}50%{opacity:0.3}}
    .page-out{animation:pageOut 0.5s ease forwards;}
    @keyframes pageOut{to{opacity:0;transform:scale(1.03);}}
  </style>
</head>
<body>
  <canvas id="bg"></canvas>
  <div class="grid-overlay"></div>
  <div class="orb orb-1"></div>
  <div class="orb orb-2"></div>

  <div class="splash-container" id="splashContainer">
    <div class="logo-wrapper">
      <div class="logo-ring"></div>
      <div class="logo-ring-2"></div>
      <img src="logo.jpg" alt="UPLA" class="logo-img">
    </div>
    <div class="upla-text">Universidad Peruana Los Andes</div>
    <h1 class="splash-title"><span>Portafolio</span><br>Académico</h1>
    <p class="splash-name">Brandon Kody Santillan Trujillo</p>
    <p class="splash-sub">Ingeniería de Sistemas y Computación &nbsp;·&nbsp; 2026</p>
    <button class="enter-btn" onclick="goToLogin()">→ Ingresar al Portafolio</button>
    <div class="dots">
      <div class="dot active"></div><div class="dot"></div><div class="dot"></div>
    </div>
  </div>

  <script>
    const canvas=document.getElementById('bg'),ctx=canvas.getContext('2d');
    let W,H,pts=[];
    const resize=()=>{W=canvas.width=innerWidth;H=canvas.height=innerHeight;};
    resize();window.addEventListener('resize',resize);
    for(let i=0;i<60;i++)pts.push({x:Math.random()*2000,y:Math.random()*1200,vx:(Math.random()-.5)*.25,vy:(Math.random()-.5)*.25,r:Math.random()*1.3+.4});
    function draw(){ctx.clearRect(0,0,W,H);pts.forEach(p=>{p.x+=p.vx;p.y+=p.vy;if(p.x<0||p.x>W)p.vx*=-1;if(p.y<0||p.y>H)p.vy*=-1;ctx.beginPath();ctx.arc(p.x,p.y,p.r,0,Math.PI*2);ctx.fillStyle='rgba(0,229,255,0.6)';ctx.fill();});pts.forEach((a,i)=>pts.slice(i+1).forEach(b=>{const d=Math.hypot(a.x-b.x,a.y-b.y);if(d<110){ctx.beginPath();ctx.moveTo(a.x,a.y);ctx.lineTo(b.x,b.y);ctx.strokeStyle=`rgba(0,229,255,${0.12*(1-d/110)})`;ctx.lineWidth=.5;ctx.stroke();}}));requestAnimationFrame(draw);}
    draw();
    function goToLogin(){
      if(!sessionStorage.getItem('role')){
        sessionStorage.setItem('role','guest');
        sessionStorage.setItem('user','visitante');
      }
      document.getElementById('splashContainer').classList.add('page-out');
      setTimeout(()=>location.href='portafolio.html',500);
    }
    if(sessionStorage.getItem('role'))location.href='portafolio.html';
  </script>
</body>
</html>
